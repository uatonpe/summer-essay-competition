<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>निबंध सादर करा</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--blue:#0a2366;--blue2:#103f99;--red:#e43322;--orange:#ff8400;--gold:#ffc638;--text:#18243f;--muted:#56637d;--border:#dce5fb}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Mukta',sans-serif;background:linear-gradient(180deg,#fff5d7 0%,#eef7ff 45%,#ffffff 100%);color:var(--text)}
    .wrap{max-width:900px;margin:auto;padding:16px}
    .panel{background:#fff;border:1px solid #e7edfc;border-radius:28px;box-shadow:0 20px 52px rgba(10,35,102,.12);padding:22px}
    .head{text-align:center;margin-bottom:10px}
    .badge{display:inline-block;background:#fff7db;border:1px solid #ffd76e;color:#7b4700;padding:7px 12px;border-radius:999px;font-weight:700;font-size:14px}
    h1{margin:10px 0 6px;color:var(--blue);font-size:clamp(30px,5vw,42px);font-weight:800;line-height:1.12}
    .lead{margin:0 auto 8px;color:var(--muted);font-size:18px;max-width:650px;line-height:1.55;font-weight:500}
    .info{background:#f4f8ff;border:1px solid #dfe8ff;color:#284777;padding:14px 16px;border-radius:18px;font-size:16px;line-height:1.55;font-weight:600;margin:16px 0}
    label{display:block;margin:14px 0 6px;color:var(--blue);font-weight:800;font-size:18px}
    input,textarea{width:100%;border:2px solid var(--border);border-radius:16px;padding:14px 15px;font-family:'Mukta',sans-serif;font-size:18px;color:var(--text);outline:none;background:#fff}
    input:focus,textarea:focus{border-color:#0e47a1;box-shadow:0 0 0 4px rgba(14,71,161,.09)}
    textarea{min-height:340px;resize:vertical;line-height:1.75}
    .meta{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:8px;color:#5a6984;font-size:15px;font-weight:600}
    .btn{width:100%;border:0;border-radius:18px;background:linear-gradient(135deg,#e71e1e,#ff8b00);color:#fff;font-size:22px;font-weight:800;padding:15px 18px;margin-top:18px;cursor:pointer;box-shadow:0 14px 30px rgba(228,51,34,.26)}
    .status{text-align:center;margin-top:14px;font-size:17px;font-weight:700;color:#103f99;line-height:1.5}
    @media (max-width:640px){
      .wrap{padding:12px}
      .panel{padding:16px;border-radius:22px}
      .lead{font-size:17px}
      label{font-size:17px}
      input,textarea{font-size:17px;padding:13px 14px}
      textarea{min-height:300px}
      .btn{font-size:20px;border-radius:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="head">
        <div class="badge">समर व्हेकेशन स्पेशल २०२६</div>
        <h1>निबंध सादर करा</h1>
        <p class="lead">कृपया विद्यार्थ्याचे पूर्ण नाव आणि खाली दिलेल्या जागेत पूर्ण निबंध लिहा.</p>
      </div>

      <div class="info">सूचना : प्रमाणपत्रावर जसे नाव छापायचे आहे तसेच नाव येथे अचूक लिहा. निबंध सादर केल्यानंतर प्रमाणपत्र तयार होईल.</div>

      <form id="essayForm">
        <label for="studentName">विद्यार्थ्याचे पूर्ण नाव</label>
        <input id="studentName" type="text" required placeholder="उदा. आराध्या संतोष पाटील">

        <label for="essayText">पूर्ण निबंध</label>
        <textarea id="essayText" required placeholder="येथे तुमचा पूर्ण निबंध लिहा..."></textarea>
        <div class="meta">
          <span>भाषा : मराठी</span>
          <span id="countInfo">शब्दसंख्या : ०</span>
        </div>

        <button class="btn" type="submit">निबंध सादर करा</button>
        <div class="status" id="status"></div>
      </form>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFO1PYO8DmIoxK959wahgmqYDiwhXwh-uXw6SSsTMfiARUTosI6TCq3vBqqEgXJky2/exec';

    const studentName = document.getElementById('studentName');
    const essayText = document.getElementById('essayText');
    const countInfo = document.getElementById('countInfo');
    const statusEl = document.getElementById('status');

    function makeCertificateNumber(name){
      const letters = (name || 'STUDENT').replace(/\s+/g,'').slice(0,4).toUpperCase();
      return 'AITSG-' + letters + '-' + Math.floor(100000 + Math.random()*900000);
    }

    function updateWordCount(){
      const words = essayText.value.trim() ? essayText.value.trim().split(/\s+/).length : 0;
      countInfo.textContent = 'शब्दसंख्या : ' + words.toLocaleString('mr-IN');
    }

    essayText.addEventListener('input', updateWordCount);
    updateWordCount();

    document.getElementById('essayForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const name = studentName.value.trim();
      const essay = essayText.value.trim();
      if(!name || !essay){
        alert('कृपया विद्यार्थ्याचे नाव आणि पूर्ण निबंध लिहा.');
        return;
      }

      const certificateNo = makeCertificateNumber(name);
      statusEl.textContent = 'कृपया थोडी प्रतीक्षा करा... तुमची माहिती सुरक्षितपणे जतन होत आहे.';

      const payload = {
        studentName: name,
        essayText: essay,
        certificateNo: certificateNo,
        submittedAt: new Date().toLocaleString('mr-IN')
      };

      try {
        if(!SCRIPT_URL.includes('PASTE_')){
          await fetch(SCRIPT_URL, {
            method:'POST',
            mode:'no-cors',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
          });
        }

        localStorage.setItem('studentName', name);
        localStorage.setItem('certificateNo', certificateNo);
        localStorage.setItem('submittedDate', new Date().toLocaleDateString('mr-IN'));
        window.location.href = 'certificate.html';
      } catch(err){
        statusEl.textContent = 'नेटवर्कमध्ये अडथळा आला आहे. कृपया पुन्हा प्रयत्न करा.';
      }
    });
  </script>
</body>
</html>
